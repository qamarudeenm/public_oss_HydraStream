version: 2

models:
  - name: clickstream_summary
    config:
      contract:
        enforced: true
    columns:
      - name: event_type
        data_type: STRING
      - name: session_id
        data_type: STRING
      - name: product_id
        data_type: STRING
        description: "The unique identifier for the product, extracted from the top-level event field or coalesced from the legacy 'data' map."
      - name: event_count
        data_type: BIGINT
      - name: window_start
        data_type: TIMESTAMP(3)
      - name: window_end
        data_type: TIMESTAMP(3)
