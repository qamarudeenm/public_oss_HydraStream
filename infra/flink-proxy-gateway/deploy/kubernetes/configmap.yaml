apiVersion: v1
kind: ConfigMap
metadata:
  name: flink-gateway-proxy-config
  namespace: default
data:
  PROXY_LISTEN_HOST: "0.0.0.0"
  PROXY_LISTEN_PORT: "8080"
  PROXY_SESSION_HEARTBEAT_INTERVAL: "30"
  PROXY_SESSION_IDLE_TIMEOUT: "600"
  PROXY_AUTH_MODE: "passthrough"
  PROXY_DEFAULT_PRINCIPAL: "proxy-user"
  PROXY_LOG_LEVEL: "info"
