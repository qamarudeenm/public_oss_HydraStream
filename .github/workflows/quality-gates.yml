name: Quality Gates

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  repository-hygiene:
    name: Repository Hygiene
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure generated dbt artifacts are not tracked
        run: |
          tracked_artifacts="$(git ls-files 'streaming_infra/dbt/target/**' 'streaming_infra/dbt/logs/**')"
          if [ -n "$tracked_artifacts" ]; then
            echo "Tracked dbt artifacts detected:"
            echo "$tracked_artifacts"
            exit 1
          fi

  proxy-quality:
    name: Flink Proxy Quality
    runs-on: self-hosted
    defaults:
      run:
        working-directory: streaming_infra/infra/flink-proxy-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint and type check
        run: make lint

      - name: Unit tests
        run: make test-unit

  frontend-quality:
    name: Frontend Lint
    runs-on: self-hosted
    defaults:
      run:
        working-directory: control_plane/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: control_plane/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  security-release-gate:
    name: Cybersecurity Release Gate
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run gate
        run: ./streaming_infra/security/cybersecurity-gate.sh
