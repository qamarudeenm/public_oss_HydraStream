apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-gateway-proxy
  namespace: default
  labels:
    app: flink-gateway-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flink-gateway-proxy
  template:
    metadata:
      labels:
        app: flink-gateway-proxy
    spec:
      containers:
        - name: proxy
          image: flink-gateway-proxy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PROXY_FLINK_GATEWAY_URL
              value: "http://flink-sql-gateway:8083"
          envFrom:
            - configMapRef:
                name: flink-gateway-proxy-config
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
